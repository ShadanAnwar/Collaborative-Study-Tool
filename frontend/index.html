<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>StudySync — Login</title>
  <meta name="description" content="Sign in or create an account on StudySync, the collaborative study tool for teams." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/assets/app.css" />
</head>
<body class="auth-page">

  <div class="auth-bg">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>
  </div>

  <div class="auth-container">
    <div class="auth-card glass">
      <div class="auth-logo">
        <span class="logo-icon">📚</span>
        <span class="logo-text">StudySync</span>
      </div>
      <p class="auth-tagline">Collaborate. Learn. Achieve.</p>

      <!-- Tab switcher -->
      <div class="auth-tabs">
        <button class="tab-btn active" id="tab-login" onclick="switchTab('login')">Sign In</button>
        <button class="tab-btn" id="tab-register" onclick="switchTab('register')">Sign Up</button>
      </div>

      <!-- Login form -->
      <form id="form-login" class="auth-form" onsubmit="handleLogin(event)">
        <div class="form-group">
          <label for="login-email">Email</label>
          <input id="login-email" type="email" placeholder="you@example.com" required autocomplete="email" />
        </div>
        <div class="form-group">
          <label for="login-password">Password</label>
          <input id="login-password" type="password" placeholder="••••••••" required autocomplete="current-password" />
        </div>
        <div id="login-error" class="form-error hidden"></div>
        <button type="submit" class="btn-primary" id="login-btn">
          <span class="btn-text">Sign In</span>
          <span class="btn-spinner hidden">⏳</span>
        </button>
      </form>

      <!-- Register form -->
      <form id="form-register" class="auth-form hidden" onsubmit="handleRegister(event)">
        <div class="form-group">
          <label for="reg-username">Username</label>
          <input id="reg-username" type="text" placeholder="coolstudent" required autocomplete="username" />
        </div>
        <div class="form-group">
          <label for="reg-email">Email</label>
          <input id="reg-email" type="email" placeholder="you@example.com" required autocomplete="email" />
        </div>
        <div class="form-group">
          <label for="reg-password">Password</label>
          <input id="reg-password" type="password" placeholder="min 6 characters" required autocomplete="new-password" minlength="6" />
        </div>
        <div id="reg-error" class="form-error hidden"></div>
        <button type="submit" class="btn-primary" id="register-btn">
          <span class="btn-text">Create Account</span>
          <span class="btn-spinner hidden">⏳</span>
        </button>
      </form>
    </div>
  </div>

  <script src="/assets/app.js"></script>
  <script>
    // Redirect if already logged in
    if (localStorage.getItem('token')) window.location.href = '/dashboard';

    function switchTab(tab) {
      document.getElementById('form-login').classList.toggle('hidden', tab !== 'login');
      document.getElementById('form-register').classList.toggle('hidden', tab !== 'register');
      document.getElementById('tab-login').classList.toggle('active', tab === 'login');
      document.getElementById('tab-register').classList.toggle('active', tab === 'register');
    }

    async function handleLogin(e) {
      e.preventDefault();
      const btn = document.getElementById('login-btn');
      const errEl = document.getElementById('login-error');
      setLoading(btn, true);
      errEl.classList.add('hidden');
      try {
        const data = await api('/api/auth/login', 'POST', {
          email: document.getElementById('login-email').value,
          password: document.getElementById('login-password').value,
        });
        localStorage.setItem('token', data.access_token);
        localStorage.setItem('user', JSON.stringify(data.user));
        window.location.href = '/dashboard';
      } catch (err) {
        errEl.textContent = err.message || 'Login failed';
        errEl.classList.remove('hidden');
      } finally {
        setLoading(btn, false);
      }
    }

    async function handleRegister(e) {
      e.preventDefault();
      const btn = document.getElementById('register-btn');
      const errEl = document.getElementById('reg-error');
      setLoading(btn, true);
      errEl.classList.add('hidden');
      try {
        const data = await api('/api/auth/register', 'POST', {
          username: document.getElementById('reg-username').value,
          email: document.getElementById('reg-email').value,
          password: document.getElementById('reg-password').value,
        });
        localStorage.setItem('token', data.access_token);
        localStorage.setItem('user', JSON.stringify(data.user));
        window.location.href = '/dashboard';
      } catch (err) {
        errEl.textContent = err.message || 'Registration failed';
        errEl.classList.remove('hidden');
      } finally {
        setLoading(btn, false);
      }
    }
  </script>
</body>
</html>
